<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>bahasa isyarat</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  overflow:hidden;
  background:#050816;
  color:white;
}

video{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

canvas{
  position:fixed;
  inset:0;
  width:100%;
  height:100%;
  z-index:-1;
}

.overlay{
  position:fixed;
  inset:0;
  background:
  linear-gradient(
    to top,
    rgba(0,0,0,0.8),
    rgba(0,0,0,0.15)
  );
}

.ui{
  position:relative;
  z-index:10;
  padding:20px;
}

.title{
  text-align:center;
  margin-top:10px;
}

.title h1{
  font-size:34px;
  color:#00e5ff;
  text-shadow:0 0 20px #00e5ff;
}

.title p{
  margin-top:5px;
  color:#a7c1df;
}

.card{

  margin-top:25px;

  background:rgba(255,255,255,0.06);

  border:1px solid rgba(0,255,255,0.2);

  border-radius:22px;

  padding:22px;

  backdrop-filter:blur(12px);

  box-shadow:
  0 0 25px rgba(0,255,255,0.12);

}

.label{
  color:#8db0d1;
  font-size:14px;
}

.gesture{
  margin-top:14px;
  text-align:center;
  font-size:36px;
  color:#00ffd5;
  font-weight:bold;
}

.status{
  margin-top:12px;
  text-align:center;
  color:#d4e7ff;
}

.button{
  width:100%;
  margin-top:20px;

  padding:15px;

  border:none;

  border-radius:16px;

  background:#00d9ff;

  color:#04111f;

  font-weight:bold;

  font-size:16px;

  cursor:pointer;

  transition:0.3s;
}

.button:hover{
  transform:scale(1.03);
}

.footer{
  text-align:center;
  margin-top:24px;
  color:#748ba6;
  font-size:13px;
}

.pulse{
  animation:pulse 2s infinite;
}

@keyframes pulse{

  0%{
    opacity:1;
  }

  50%{
    opacity:0.5;
  }

  100%{
    opacity:1;
  }

}

</style>
</head>

<body>

<video
id="video"
autoplay
playsinline
muted>
</video>

<canvas id="canvas"></canvas>

<div class="overlay"></div>

<div class="ui">

  <div class="title">
    <h1>🤟 AZKA SIGN AI PRO</h1>
    <p>Realtime Gesture Voice System</p>
  </div>

  <div class="card">

    <div class="label">
      AI Detection Result
    </div>

    <div
    class="gesture pulse"
    id="gestureText">
      Menunggu kamera...
    </div>

    <div
    class="status"
    id="status">
      Sistem belum aktif
    </div>

    <button
    class="button"
    onclick="startCamera()">
      📷 START AI
    </button>

  </div>

  <div class="footer">
    👍 ✌️ 👋 ✊ ☝️ 🤟 🖐️ ✋ 🫶 Detection
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>

const video =
  document.getElementById("video");

const canvas =
  document.getElementById("canvas");

const ctx =
  canvas.getContext("2d");

const gestureText =
  document.getElementById("gestureText");

const statusText =
  document.getElementById("status");

canvas.width =
  window.innerWidth;

canvas.height =
  window.innerHeight;

let cameraStarted = false;

let currentGesture =
  "Tidak ada gesture";

let lastSpoken = "";

let lastSpeakTime = 0;

window.speechSynthesis.onvoiceschanged =
()=>{
  speechSynthesis.getVoices();
};

async function startCamera(){

  if(cameraStarted) return;

  try{

    // aktifkan voice engine dulu
    speechSynthesis.speak(
      new SpeechSynthesisUtterance("")
    );

    const stream =
      await navigator
      .mediaDevices
      .getUserMedia({

        video:{
          facingMode:"environment"
        },

        audio:false

      });

    video.srcObject = stream;

    await video.play();

    statusText.innerText =
      "Kamera aktif • AI berjalan ⚡";

    cameraStarted = true;

    startTracking();

  }catch(error){

    gestureText.innerText =
      "Kamera ditolak";

    statusText.innerText =
      "Izinkan akses kamera";

    console.error(error);

  }

}

function speak(text){

  const now = Date.now();

  if(
    lastSpoken === text &&
    now - lastSpeakTime < 2500
  ) return;

  lastSpoken = text;

  lastSpeakTime = now;

  speechSynthesis.cancel();

  const speech =
    new SpeechSynthesisUtterance();

  speech.text = text;

  speech.lang = "id-ID";

  speech.rate = 1;

  speech.pitch = 1;

  speech.volume = 1;

  const voices =
    speechSynthesis.getVoices();

  const indoVoice =
    voices.find(
      voice =>
      voice.lang.includes("id")
    );

  if(indoVoice){
    speech.voice = indoVoice;
  }

  speechSynthesis.speak(speech);

}

function startTracking(){

  const hands = new Hands({

    locateFile:(file)=>{
      return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
    }

  });

  hands.setOptions({

    maxNumHands:1,

    modelComplexity:1,

    minDetectionConfidence:0.7,

    minTrackingConfidence:0.7

  });

  hands.onResults(results=>{

    ctx.clearRect(
      0,
      0,
      canvas.width,
      canvas.height
    );

    if(results.multiHandLandmarks){

      for(const landmarks of results.multiHandLandmarks){

        drawConnectors(
          ctx,
          landmarks,
          HAND_CONNECTIONS,
          {
            color:"#00ffff",
            lineWidth:4
          }
        );

        drawLandmarks(
          ctx,
          landmarks,
          {
            color:"#00ff99",
            lineWidth:2
          }
        );

        detectGesture(landmarks);

      }

    }else{

      currentGesture =
        "Tidak ada tangan";

      gestureText.innerText =
        "❌ TIDAK ADA TANGAN";

    }

  });

  const camera = new Camera(video,{

    onFrame:async()=>{

      await hands.send({
        image:video
      });

    },

    width:1280,
    height:720

  });

  camera.start();

}

function up(tip,pip,landmarks){

  return landmarks[tip].y <
         landmarks[pip].y;

}

function detectGesture(landmarks){

  const thumb =
    landmarks[4].x <
    landmarks[3].x;

  const index =
    up(8,6,landmarks);

  const middle =
    up(12,10,landmarks);

  const ring =
    up(16,14,landmarks);

  const pinky =
    up(20,18,landmarks);

  // 👍 LIKE
  if(
    thumb &&
    !index &&
    !middle &&
    !ring &&
    !pinky
  ){

    currentGesture = "Baik";

    gestureText.innerText =
      "👍 BAIK";

    speak("Baik");

  }

  // ☝️ ONE
  else if(
    index &&
    !middle &&
    !ring &&
    !pinky
  ){

    currentGesture = "Satu";

    gestureText.innerText =
      "☝️ SATU";

    speak("Satu");

  }

  // ✌️ PEACE
  else if(
    index &&
    middle &&
    !ring &&
    !pinky
  ){

    currentGesture = "Damai";

    gestureText.innerText =
      "✌️ DAMAI";

    speak("Damai");

  }

  // 👋 HALO
  else if(
    thumb &&
    index &&
    middle &&
    ring &&
    pinky
  ){

    currentGesture = "Halo";

    gestureText.innerText =
      "👋 HALO";

    speak("Halo");

  }

  // ✊ STOP
  else if(
    !index &&
    !middle &&
    !ring &&
    !pinky
  ){

    currentGesture = "Stop";

    gestureText.innerText =
      "✊ STOP";

    speak("Stop");

  }

  // 🤟 LOVE
  else if(
    index &&
    pinky &&
    !middle &&
    !ring
  ){

    currentGesture =
      "Aku sayang kamu";

    gestureText.innerText =
      "🤟 LOVE";

    speak("Aku sayang kamu");

  }

  // 🖐️ FIVE
  else if(
    index &&
    middle &&
    ring &&
    pinky &&
    !thumb
  ){

    currentGesture = "Lima";

    gestureText.innerText =
      "🖐️ LIMA";

    speak("Lima");

  }

  // ✋ WAIT
  else if(
    thumb &&
    !index &&
    middle &&
    ring &&
    pinky
  ){

    currentGesture = "Tunggu";

    gestureText.innerText =
      "✋ TUNGGU";

    speak("Tunggu");

  }

  // 🫶 HEART
  else if(
    thumb &&
    index &&
    !middle &&
    !ring &&
    pinky
  ){

    currentGesture = "Hati";

    gestureText.innerText =
      "🫶 HATI";

    speak("Hati");

  }

  else{

    currentGesture =
      "Gesture tidak dikenali";

    gestureText.innerText =
      "🤖 TIDAK DIKENALI";

  }

}

</script>

</body>
</html>
